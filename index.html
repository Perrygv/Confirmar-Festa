<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmar presença</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#89cff0,#f3d9fa);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.caixa{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    text-align:center;
    width:420px;
}

h1{
    margin-bottom:30px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

#sim{
    background:#43a047;
    color:white;
}

#sim:hover{
    transform:scale(1.05);
}

#nao{
    background:#e53935;
    color:white;
    position:fixed;
}

#mensagem{
    margin-top:25px;
    font-size:22px;
    color:#43a047;
    display:none;
}
</style>
</head>

<body>

<div class="caixa">
    <h1>Confirmar presença na festa do Perry?</h1>

    <button id="sim">🎉 Sim! Não perderei por nada!</button>

    <div id="mensagem">
        🥳 Perfeito! Te espero na festa!
    </div>
</div>

<button id="nao">🙈 Não posso</button>

<script>

const botaoNao = document.getElementById("nao");

function moverBotao(){

    const largura = window.innerWidth - botaoNao.offsetWidth;
    const altura = window.innerHeight - botaoNao.offsetHeight;

    const x = Math.random()*largura;
    const y = Math.random()*altura;

    botaoNao.style.left = x+"px";
    botaoNao.style.top = y+"px";
}

// posição inicial
moverBotao();

// quando o mouse chega perto
document.addEventListener("mousemove",(e)=>{

    const rect = botaoNao.getBoundingClientRect();

    const centroX = rect.left + rect.width/2;
    const centroY = rect.top + rect.height/2;

    const distancia = Math.hypot(
        e.clientX-centroX,
        e.clientY-centroY
    );

    if(distancia < 120){
        moverBotao();
    }

});

document.getElementById("sim").onclick=function(){
    document.getElementById("mensagem").style.display="block";
}

</script>

</body>
</html>
